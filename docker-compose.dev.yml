# DEV ONLY — volume mount + hot reload + safe migrations
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  kraeved_postgres:
    image: postgres:15
    container_name: kraeved_postgres
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  kraeved_redis:
    image: redis:latest
    container_name: kraeved_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  kraeved_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kraeved_api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "18000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      kraeved_postgres:
        condition: service_healthy
      kraeved_redis:
        condition: service_healthy
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/ping')\"",
        ]
      interval: 5s
      timeout: 5s
      start_period: 15s
      retries: 10
    networks:
      - internal

volumes:
  pgdata:
  redisdata:

networks:
  internal:
    driver: bridge
