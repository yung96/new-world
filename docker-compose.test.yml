# Этот файл предназначен для прогона тестов.
# Он поднимает полностью изолированную БД и Redis для pytest.

services:
  kraeved_test_postgres:
    image: postgres:15
    env_file:
      - .env.test
    environment:
      # Важно: не используем ${...} подстановки на уровне compose,
      # чтобы можно было запускать без `--env-file .env.test`.
      DB_HOST: db_test
      DB_USER: user_test
      DB_PASS: password_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 2s
      timeout: 2s
      retries: 20

  kraeved_test_redis:
    image: redis:latest
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20

  kraeved_tests_runner:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.test
    depends_on:
      kraeved_test_postgres:
        condition: service_healthy
      kraeved_test_redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && pytest -vv -ra"
